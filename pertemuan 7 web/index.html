<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Belajar JavaScript</title>
</head>
<body>

    <h2>Belajar JavaScript</h2>

    <script>
        let angka1 = parseInt(prompt("Angka 1 ?", ""));
        let angka2 = parseInt(prompt("Angka 2 ?", ""));

        let hasil = "";

        if (angka1 <= angka2) {
            for (let i = angka1; i <= angka2; i++) {
                hasil += i + "<br>";
            }
        } else {
            for (let i = angka1; i >= angka2; i--) {
                hasil += i + "<br>";
            }
        }

        document.write("<h3>Hasil:</h3>");
        document.write(hasil);
    </script>

</body>
</html>
