<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>

<body>

    <h2>Silahkan Isikan Data</h2>

    <form action="login.html">

        <table>

            <tr>
                <td>
                    <label for="fname">First name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="fname" value="John">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="mname">Middle name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="mname" value="John">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="lname">Last name</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="lname" value="John">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="date">Tanggal Lahir</label>
                </td>
                <td>:</td>
                <td>
                    <input type="date" id="date">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="lname">Jenis Kelamin</label>
                </td>
                <td>:</td>
                <td>
                    <input type="radio" id="Pria" name="fav_language" value="HTML">
                    <label for="Pria">Pria</label><br>

                    <input type="radio" id="CSS" name="fav_language" value="CSS">
                    <label for="Wanita">Wanita</label><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="lname">Tempat Tinggal</label>
                </td>
                <td>:</td>
                <td>
                    <input list="browsers" name="browser">
                    <datalist id="browsers">
                        <option value="Medan">
                        <option value="Sunggal">
                        <option value="Pakam">
                        <option value="Helvet">
                        <option value="Johor">
                    </datalist>
                    <!-- <input type="submit"> -->
                </td>
            </tr>
            
            <tr>
                <td>
                    <label for="email">Email</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="email" value="example@mail.com">
                </td>
            </tr>
            
            <tr>
                <td>
                    <label for="Phone">Phone</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="Phone" value="082312345678">
                </td>
            </tr>
            
            <tr>
                <td>
                    <label for="Pasword">Pasword</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" id="Pasword" value="password" minlength="8">
                </td>
            </tr>
            
            <tr>
                <td>
                    <input type="submit" value="Daftar">
                </td>
            
                <td colspan="3">
                    <span>
                        <a href="register.html">Lupa Password</a>
                    </span>
                </td>
            </tr>
            
            <tr>
                <td>
            
                </td>
            </tr>
            
            </table>
            
            </form>
            
            </body>
            </html>
